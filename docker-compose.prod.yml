version: '3.8'

services:
  finance-web-app:
    image: ghcr.io/fede-f/personalfinanceweb:latest
    restart: always
    environment:
      - VIRTUAL_HOST=finance.planner.ar
      - LETSENCRYPT_HOST=finance.planner.ar
      - LETSENCRYPT_EMAIL=infinitto@gmail.com
      - VIRTUAL_PORT=3000
      - PORT=3000
    env_file:
      - .env.prod
    expose:
      - "3000"
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
