version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finance-app-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: finance_app
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always

